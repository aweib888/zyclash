rule-providers:
# 本地/局域网地址
  LocalAreaNetwork: 
    url: https://testingcf.jsdelivr.net/gh/ACL4SSR/ACL4SSR@master/Clash/LocalAreaNetwork.list
    path: ./ruleset/LocalAreaNetwork.list
    behavior: classical
    interval: 86400
    format: text
    输入: http
    
# 自用直连网站
  China_zhilian_zy: 
    url: https://raw.githubusercontent.com/aweib888/zyclash/refs/heads/main/dkyt_clash/China_zhilian_zy.list
    path: ./ruleset/zhilianzy.list
    behavior: classical
    interval: 86400
    format: text
    输入: http

# 自用国外代理网站
  guowaiwz_proxy_zy: 
    url: https://raw.githubusercontent.com/aweib888/zyclash/refs/heads/main/dkyt_clash/guowaiwz_proxy_zy.list
