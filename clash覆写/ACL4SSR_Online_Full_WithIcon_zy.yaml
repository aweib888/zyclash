    behavior: classical
    interval: 86400
    format: text
    输入: http

# Unbreak 白名单 不应该被广告链接的网站
  UnBan:
    url: https://testingcf.jsdelivr.net/gh/ACL4SSR/ACL4SSR@master/Clash/UnBan.list
    path: ./ruleset/UnBan.list
    behavior: classical
    interval: 86400
    format: text
    输入: http

