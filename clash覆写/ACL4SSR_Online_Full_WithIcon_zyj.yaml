proxy-groups:
  - name: 节点选择
    icon: https://testingcf.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Proxy.png
    type: select
    proxies:
      - 自动选择
      - 手动切换
      - 非日本节点
      - 日本节点
      - 美国节点
      - 香港节点
      - 澳大利亚节点
      - 英国节点
      - 印度节点
      - 其他节点
      - DIRECT
  - name: 手动切换
    icon: https://testingcf.jsdelivr.net/gh/shindgewongxj/WHATSINStash@master/icon/select.png
    include-all: true
    type: select
  - name: 自动选择
    icon: https://testingcf.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Auto.png
    type: url-test
    include-all: true
    interval: 9000
    tolerance: 50
  - name: 广告拦截
    icon: https://testingcf.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/AdBlack.png
    type: select
    proxies:
      - REJECT
      - DIRECT
  - name: 应用净化
    icon: https://testingcf.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Hijacking.png
    type: select
    proxies:
      - REJECT
      - DIRECT
  - name: 漏网之鱼
    icon: https://testingcf.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Final.png
    type: select
    proxies:
      - DIRECT
      - 节点选择
      - 自动选择
      - 非日本节点
      - 日本节点
      - 美国节点
      - 香港节点
      - 澳大利亚节点
      - 英国节点
      - 印度节点
      - 其他节点
      - 手动切换
  - name: 非日本节点
    type: url-test
    interval: 9000
    tolerance: 50
    icon: https://testingcf.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Global.png
    include-all: true
    filter: (?i)^(?!.*(日本|川日|东京|大阪|泉日|埼玉|沪日|深日|JP|Japan)).*$
  - name: 香港节点
    icon: https://testingcf.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Hong_Kong.png
    include-all: true
    filter: (?i)港|HK|hk|Hong Kong|HongKong|hongkong
    type: url-test
    interval: 9000
    tolerance: 50
  - name: 澳大利亚节点
    icon: https://testingcf.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Australia.png
    include-all: true
    filter: (?i)澳大利亚|🇦🇺|au|australia|sydney
    type: url-test
    interval: 9000
    tolerance: 50
  - name: 英国节点
    icon: https://testingcf.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/EG.png
    include-all: true
    filter: (?i)英|🇬🇧|uk|kingdom
    type: url-test
    interval: 9000
    tolerance: 50
  - name: 日本节点
    icon: https://testingcf.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Japan.png
    include-all: true
    filter: (?i)日本|川日|东京|大阪|泉日|埼玉|沪日|深日|JP|Japan
    type: url-test
    interval: 9000
    tolerance: 50
  - name: 美国节点
    icon: https://testingcf.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/United_States.png
    include-all: true
    filter: (?i)美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US|United States
    type: url-test
    interval: 9000
    tolerance: 50
  - name: 印度节点
    icon: https://testingcf.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/India.png
    include-all: true
    filter: (?i)印度|India
    type: url-test
    interval: 9000
    tolerance: 50
  - name: 其他节点
    icon: https://testingcf.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Taiwan.png
    include-all: true
    filter: (?i)以色列|台|俄罗斯|土耳其|沙|加拿大|南非|西|智利|巴|尼|意|韩
    type: url-test
    interval: 9000
    tolerance: 50
  - name: GLOBAL
    icon: https://testingcf.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Global.png
    include-all: true
    type: select
    proxies:
      - 节点选择
      - 手动切换
      - 自动选择
      - 广告拦截
      - 应用净化
      - 漏网之鱼
      - 非日本节点
      - 日本节点
      - 美国节点
      - 香港节点
      - 澳大利亚节点
      - 英国节点
      - 印度节点
      - 其他节点

